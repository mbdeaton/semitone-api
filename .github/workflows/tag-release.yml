name: Tag Release

on:
  push:
    branches: ["main"]
    paths: ["pyproject.toml"]
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: tag-release-main
  cancel-in-progress: false

jobs:
  tag:
    runs-on: ubuntu-latest

    steps:
      - name: Require release token
        run: '[ -n "${{ secrets.RELEASE_TOKEN }}" ] || { echo "Missing required secret: RELEASE_TOKEN"; exit 1; }'

      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
          token: ${{ secrets.RELEASE_TOKEN }}

      - name: Resolve version tag
        id: version
        run: |
          VERSION=$(python - <<'PY'
          import tomllib
          from pathlib import Path
          data = tomllib.loads(Path("pyproject.toml").read_text())
          print(data["project"]["version"])
          PY
          )
          echo "tag=v$VERSION" >> "$GITHUB_OUTPUT"

      - name: Create and push tag (if missing)
        run: |
          TAG="${{ steps.version.outputs.tag }}"

          if git rev-parse "$TAG" >/dev/null 2>&1; then
            echo "Tag $TAG already exists; nothing to do."
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git tag -a "$TAG" -m "Release $TAG"
          git push origin "$TAG"

      - name: Summary
        run: echo "Release tagging complete for ${{ steps.version.outputs.tag }}"
