name: Style

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

jobs:
  style-lint-type:
    runs-on: ubuntu-latest

    env:
      CHECK_DIRS: "semitone_api tests"

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version: "3.10"
          cache: "pip"

      - name: Install Poetry
        run: pip install poetry

      - name: Configure Poetry
        run: poetry config virtualenvs.in-project true

      - name: Validate project metadata
        run: poetry check

      - name: Verify lockfile is up to date
        run: |
          poetry lock
          git diff --exit-code poetry.lock

      - name: Install dependencies
        run: poetry install --no-interaction --no-root --sync

      - name: Run formatter check (Black)
        run: poetry run black --check --diff --line-length 80 $CHECK_DIRS

      - name: Run linter (Pylint)
        run: poetry run pylint $CHECK_DIRS

      - name: Run type checker (Mypy)
        run: poetry run mypy --ignore-missing-imports $CHECK_DIRS
